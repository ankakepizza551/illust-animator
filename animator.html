<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>illust animator</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2433;
    --border: #2a3048;
    --accent: #7eb8f7;
    --accent2: #b8a4f7;
    --text: #e8ecf4;
    --muted: #6b7494;
    --glow: rgba(126, 184, 247, 0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* header */
  header {
    width: 100%;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--accent2); }
  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-left: auto;
  }

  /* main layout */
  main {
    width: 100%;
    max-width: 1100px;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 24px;
  }

  /* canvas area */
  .canvas-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 480px;
    position: relative;
    overflow: hidden;
  }
  .canvas-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--glow) 0%, transparent 70%);
    pointer-events: none;
  }

  /* drop zone */
  #dropzone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    padding: 48px;
    text-align: center;
    transition: opacity 0.2s;
  }
  #dropzone.hidden { display: none; }
  #dropzone:hover { opacity: 0.8; }

  .drop-icon {
    width: 64px;
    height: 64px;
    border: 2px dashed var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--muted);
    transition: border-color 0.2s, color 0.2s;
  }
  #dropzone:hover .drop-icon,
  .canvas-area.dragover .drop-icon {
    border-color: var(--accent);
    color: var(--accent);
  }
  .drop-label {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }
  .drop-label strong { color: var(--text); display: block; font-size: 15px; margin-bottom: 4px; }

  /* image preview */
  #preview-container {
    display: none;
    position: relative;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    min-height: 480px;
    padding: 32px;
  }
  #preview-container.visible { display: flex; }

  #illust-img {
    max-width: 100%;
    max-height: 400px;
    object-fit: contain;
    border-radius: 8px;
    transform-origin: center center;
    will-change: transform, filter;
  }

  /* animation classes */
  #illust-img.anim-float {
    animation: floatY var(--dur, 3s) ease-in-out infinite;
  }
  #illust-img.anim-sway {
    animation: sway var(--dur, 3s) ease-in-out infinite;
  }
  #illust-img.anim-breathe {
    animation: breathe var(--dur, 3s) ease-in-out infinite;
  }
  #illust-img.anim-pulse {
    animation: pulse var(--dur, 3s) ease-in-out infinite;
  }
  #illust-img.anim-wobble {
    animation: wobble var(--dur, 3s) ease-in-out infinite;
  }
  #illust-img.anim-drift {
    animation: floatY var(--dur, 3s) ease-in-out infinite, sway calc(var(--dur, 3s) * 1.4) ease-in-out infinite;
  }

  @keyframes floatY {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(calc(var(--amount, 12) * -1px)); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(calc(var(--amount, 2) * 1deg)); }
    75% { transform: rotate(calc(var(--amount, 2) * -1deg)); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(calc(1 + var(--amount, 4) * 0.005)); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(calc(1 + var(--amount, 4) * 0.005)); filter: brightness(1.08); }
  }
  @keyframes wobble {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    20% { transform: translateY(calc(var(--amount, 6) * -0.8px)) rotate(calc(var(--amount, 2) * 0.5deg)); }
    60% { transform: translateY(calc(var(--amount, 6) * -1px)) rotate(calc(var(--amount, 2) * -0.5deg)); }
    80% { transform: translateY(calc(var(--amount, 6) * -0.3px)) rotate(0deg); }
  }

  /* shadow glow effect */
  #illust-img.glow-on {
    filter: drop-shadow(0 0 20px var(--glow-color, rgba(126,184,247,0.5)));
  }
  #illust-img.anim-pulse.glow-on {
    animation: floatY var(--dur, 3s) ease-in-out infinite, pulseGlow var(--dur, 3s) ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { filter: drop-shadow(0 0 10px var(--glow-color, rgba(126,184,247,0.3))); }
    50% { filter: drop-shadow(0 0 30px var(--glow-color, rgba(126,184,247,0.7))); }
  }

  /* particles */
  #particle-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #particle-canvas.active { opacity: 1; }

  /* change button */
  #change-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    transition: color 0.2s, border-color 0.2s;
    z-index: 10;
  }
  #change-btn:hover { color: var(--text); border-color: var(--accent); }

  /* controls panel */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .panel-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* anim buttons */
  .anim-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .anim-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    padding: 10px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.3;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .anim-btn:hover { color: var(--text); border-color: var(--accent); }
  .anim-btn.active {
    background: rgba(126,184,247,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  .anim-btn .emoji { font-size: 18px; display: block; margin-bottom: 4px; }

  /* sliders */
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }
  .slider-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }
  .slider-label span { color: var(--text); font-family: 'Space Mono', monospace; font-size: 11px; }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 0 6px rgba(126,184,247,0.4);
  }

  /* toggle row */
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }
  .toggle input { display: none; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 10px;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  /* glow color */
  .color-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .color-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: white; }

  /* export */
  #export-btn {
    width: 100%;
    background: linear-gradient(135deg, rgba(126,184,247,0.2), rgba(184,164,247,0.2));
    border: 1px solid var(--accent);
    border-radius: 10px;
    color: var(--accent);
    font-size: 13px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    padding: 14px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, transform 0.1s;
  }
  #export-btn:hover { background: rgba(126,184,247,0.25); }
  #export-btn:active { transform: scale(0.98); }
  #export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .export-note {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    line-height: 1.5;
  }

  /* export settings */
  .export-settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  .export-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
  }
  .seg-group {
    display: flex;
    gap: 4px;
  }
  .seg-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    padding: 4px 9px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .seg-btn:hover { color: var(--text); border-color: var(--accent); }
  .seg-btn.active {
    background: rgba(126,184,247,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* progress bar */
  .progress-wrap {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
  }
  .progress-wrap.visible { display: flex; }
  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s;
  }
  .progress-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-align: right;
  }

  /* estimated time badge */
  .est-badge {
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'Space Mono', monospace;
  }

  /* hidden input */
  #file-input { display: none; }

  /* drag highlight */
  .canvas-area.dragover { border-color: var(--accent); }
  .canvas-area.dragover::before {
    background: radial-gradient(ellipse at 50% 50%, rgba(126,184,247,0.2) 0%, transparent 70%);
  }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" style="font-size:11px;color:var(--muted);text-decoration:none;font-family:'Space Mono',monospace;letter-spacing:0.05em;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">← ツール一覧</a>
  <div class="logo" style="margin-left:4px">illust<span>.</span>animator</div>
  <div class="tagline">upload → animate → export</div>
</header>

<main>
  <!-- canvas area -->
  <div class="canvas-area" id="canvas-area">
    <canvas id="particle-canvas"></canvas>

    <div id="dropzone">
      <div class="drop-icon">🖼️</div>
      <div class="drop-label">
        <strong>イラストをドロップ</strong>
        クリックしてファイルを選択<br>
        <small style="font-size:11px;color:var(--muted)">PNG / JPG / GIF / WebP / SVG</small>
      </div>
    </div>

    <div id="preview-container">
      <button id="change-btn">変更</button>
      <img id="illust-img" src="" alt="illust">
    </div>
  </div>

  <!-- controls -->
  <div class="controls">

    <!-- animation type -->
    <div class="panel">
      <div class="panel-title">アニメーション</div>
      <div class="anim-grid">
        <button class="anim-btn active" data-anim="float">
          <span class="emoji">🌸</span>ふわふわ
        </button>
        <button class="anim-btn" data-anim="sway">
          <span class="emoji">🌿</span>ゆらゆら
        </button>
        <button class="anim-btn" data-anim="breathe">
          <span class="emoji">💫</span>呼吸する
        </button>
        <button class="anim-btn" data-anim="pulse">
          <span class="emoji">✨</span>脈打つ
        </button>
        <button class="anim-btn" data-anim="wobble">
          <span class="emoji">🎈</span>ぷかぷか
        </button>
        <button class="anim-btn" data-anim="drift">
          <span class="emoji">☁️</span>たゆたう
        </button>
      </div>
    </div>

    <!-- parameters -->
    <div class="panel">
      <div class="panel-title">パラメーター</div>

      <div class="slider-row">
        <div class="slider-label">スピード <span id="speed-val">3.0s</span></div>
        <input type="range" id="speed" min="1" max="8" step="0.5" value="3">
      </div>
      <div class="slider-row">
        <div class="slider-label">動きの大きさ <span id="amount-val">12</span></div>
        <input type="range" id="amount" min="2" max="30" step="1" value="12">
      </div>

      <div style="height:1px;background:var(--border);margin:12px 0;"></div>

      <div class="toggle-row">
        <span>グロー効果</span>
        <label class="toggle">
          <input type="checkbox" id="glow-toggle">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="toggle-row">
        <span>パーティクル</span>
        <label class="toggle">
          <input type="checkbox" id="particle-toggle">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div id="glow-colors" style="display:none">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">グロー色</div>
        <div class="color-row">
          <div class="color-dot active" data-color="rgba(126,184,247,0.7)" style="background:#7eb8f7"></div>
          <div class="color-dot" data-color="rgba(247,150,200,0.7)" style="background:#f796c8"></div>
          <div class="color-dot" data-color="rgba(184,247,164,0.7)" style="background:#b8f7a4"></div>
          <div class="color-dot" data-color="rgba(247,220,126,0.7)" style="background:#f7dc7e"></div>
          <div class="color-dot" data-color="rgba(200,150,247,0.7)" style="background:#c896f7"></div>
          <div class="color-dot" data-color="rgba(255,255,255,0.5)" style="background:#ffffff"></div>
        </div>
      </div>
    </div>

    <!-- export -->
    <div class="panel">
      <div class="panel-title">エクスポート設定</div>

      <div class="export-settings">
        <div class="export-row">
          <span>形式</span>
          <div class="seg-group" id="fmt-group">
            <button class="seg-btn active" data-fmt="gif">GIF</button>
            <button class="seg-btn" data-fmt="webm">WebM</button>
            <button class="seg-btn" data-fmt="apng">APNG</button>
          </div>
        </div>
        <div class="export-row">
          <span>解像度</span>
          <div class="seg-group" id="res-group">
            <button class="seg-btn active" data-res="240">240px</button>
            <button class="seg-btn" data-res="400">400px</button>
            <button class="seg-btn" data-res="600">600px</button>
          </div>
        </div>
        <div class="export-row">
          <span>フレーム数</span>
          <div class="seg-group" id="frames-group">
            <button class="seg-btn" data-frames="8">8</button>
            <button class="seg-btn active" data-frames="16">16</button>
            <button class="seg-btn" data-frames="24">24</button>
          </div>
        </div>
        <div class="export-row" id="quality-row">
          <span>品質 <span style="font-size:10px;color:var(--muted)">(GIF)</span></span>
          <div class="seg-group" id="quality-group">
            <button class="seg-btn active" data-quality="10">速い</button>
            <button class="seg-btn" data-quality="5">普通</button>
            <button class="seg-btn" data-quality="1">高品質</button>
          </div>
        </div>
        <div class="export-row">
          <span>推定時間</span>
          <span class="est-badge" id="est-time">〜8秒</span>
        </div>
      </div>

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div class="progress-label" id="progress-label">0 / 16 フレーム</div>
      </div>

      <button id="export-btn" disabled>🎬 保存する</button>
      <p class="export-note">GIF: どこでも使える / WebM: 軽量・透過対応 / APNG: 高品質</p>
    </div>
  </div>
</main>

<input type="file" id="file-input" accept="image/*">

<script>
// ---- state ----
let currentAnim = 'float';
let glowColor = 'rgba(126,184,247,0.7)';
let particlesActive = false;
let particles = [];
let animFrameId = null;
let imageLoaded = false;

// ---- DOM ----
const dropzone = document.getElementById('dropzone');
const previewContainer = document.getElementById('preview-container');
const illustImg = document.getElementById('illust-img');
const canvasArea = document.getElementById('canvas-area');
const fileInput = document.getElementById('file-input');
const changeBtn = document.getElementById('change-btn');
const particleCanvas = document.getElementById('particle-canvas');
const ctx = particleCanvas.getContext('2d');
const exportBtn = document.getElementById('export-btn');

// ---- file handling ----
dropzone.addEventListener('click', () => fileInput.click());
changeBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

canvasArea.addEventListener('dragover', e => { e.preventDefault(); canvasArea.classList.add('dragover'); });
canvasArea.addEventListener('dragleave', () => canvasArea.classList.remove('dragover'));
canvasArea.addEventListener('drop', e => {
  e.preventDefault();
  canvasArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadFile(file);
});

function loadFile(file) {
  if (!file) return;
  const url = URL.createObjectURL(file);
  illustImg.src = url;
  illustImg.onload = () => {
    dropzone.classList.add('hidden');
    previewContainer.classList.add('visible');
    imageLoaded = true;
    exportBtn.disabled = false;
    applyAnim(currentAnim);
    resizeParticleCanvas();
  };
}

// ---- animation ----
document.querySelectorAll('.anim-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentAnim = btn.dataset.anim;
    applyAnim(currentAnim);
  });
});

function applyAnim(name) {
  illustImg.className = '';
  illustImg.classList.add('anim-' + name);
  if (document.getElementById('glow-toggle').checked) illustImg.classList.add('glow-on');
  illustImg.style.setProperty('--dur', document.getElementById('speed').value + 's');
  illustImg.style.setProperty('--amount', document.getElementById('amount').value);
  illustImg.style.setProperty('--glow-color', glowColor);
}

// ---- sliders ----
document.getElementById('speed').addEventListener('input', function() {
  document.getElementById('speed-val').textContent = this.value + '.0s'.replace('.0s', 's');
  document.getElementById('speed-val').textContent = parseFloat(this.value).toFixed(1) + 's';
  illustImg.style.setProperty('--dur', this.value + 's');
});
document.getElementById('amount').addEventListener('input', function() {
  document.getElementById('amount-val').textContent = this.value;
  illustImg.style.setProperty('--amount', this.value);
});

// ---- glow ----
document.getElementById('glow-toggle').addEventListener('change', function() {
  document.getElementById('glow-colors').style.display = this.checked ? 'block' : 'none';
  if (this.checked) {
    illustImg.classList.add('glow-on');
  } else {
    illustImg.classList.remove('glow-on');
  }
  applyAnim(currentAnim);
});

document.querySelectorAll('.color-dot').forEach(dot => {
  dot.addEventListener('click', function() {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    this.classList.add('active');
    glowColor = this.dataset.color;
    illustImg.style.setProperty('--glow-color', glowColor);
    applyAnim(currentAnim);
  });
});

// ---- particles ----
document.getElementById('particle-toggle').addEventListener('change', function() {
  particlesActive = this.checked;
  if (particlesActive) {
    particleCanvas.classList.add('active');
    startParticles();
  } else {
    particleCanvas.classList.remove('active');
    if (animFrameId) cancelAnimationFrame(animFrameId);
    particles = [];
    ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  }
});

function resizeParticleCanvas() {
  particleCanvas.width = canvasArea.offsetWidth;
  particleCanvas.height = canvasArea.offsetHeight;
}

window.addEventListener('resize', () => {
  resizeParticleCanvas();
  if (!particlesActive) ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
});

function spawnParticle() {
  const w = particleCanvas.width;
  const h = particleCanvas.height;
  return {
    x: Math.random() * w,
    y: h + 10,
    vx: (Math.random() - 0.5) * 0.8,
    vy: -(Math.random() * 1.2 + 0.4),
    size: Math.random() * 4 + 2,
    life: 1,
    decay: Math.random() * 0.008 + 0.003,
    color: ['#7eb8f7','#f796c8','#b8f7a4','#f7dc7e','#c896f7','#ffffff'][Math.floor(Math.random()*6)],
  };
}

function startParticles() {
  if (!particlesActive) return;
  if (Math.random() < 0.08) particles.push(spawnParticle());

  ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    // sparkle
    ctx.globalAlpha = p.life * 0.4;
    ctx.fillRect(p.x - p.size * 1.5 * p.life, p.y, p.size * 3 * p.life, 1);
    ctx.fillRect(p.x, p.y - p.size * 1.5 * p.life, 1, p.size * 3 * p.life);
  });
  ctx.globalAlpha = 1;

  animFrameId = requestAnimationFrame(startParticles);
}

// ---- export settings state ----
let exportFmt = 'gif';
let exportRes = 240;
let exportFrames = 16;
let exportQuality = 10;

function segGroup(groupId, attr, setter) {
  document.getElementById(groupId).querySelectorAll('.seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(groupId).querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setter(btn.dataset[attr]);
      updateEstTime();
    });
  });
}

segGroup('fmt-group', 'fmt', v => {
  exportFmt = v;
  document.getElementById('quality-row').style.display = v === 'gif' ? 'flex' : 'none';
});
segGroup('res-group', 'res', v => { exportRes = parseInt(v); });
segGroup('frames-group', 'frames', v => { exportFrames = parseInt(v); });
segGroup('quality-group', 'quality', v => { exportQuality = parseInt(v); });

function updateEstTime() {
  // rough estimate
  const qualityFactor = exportFmt === 'gif' ? { 10: 1, 5: 1.8, 1: 4 }[exportQuality] || 1 : 0.3;
  const resFactor = { 240: 0.5, 400: 1, 600: 2.2 }[exportRes] || 1;
  const secs = Math.round(exportFrames * qualityFactor * resFactor * 0.35);
  document.getElementById('est-time').textContent = `〜${Math.max(1, secs)}秒`;
}
updateEstTime();

// ---- export particle state (separate from preview particles) ----
let exportParticles = [];

function spawnExportParticle(w, h) {
  return {
    x: Math.random() * w,
    y: h + 10,
    vx: (Math.random() - 0.5) * 0.8,
    vy: -(Math.random() * 1.2 + 0.4),
    size: Math.random() * 4 + 2,
    life: 1,
    decay: Math.random() * 0.008 + 0.003,
    color: ['#7eb8f7','#f796c8','#b8f7a4','#f7dc7e','#c896f7','#ffffff'][Math.floor(Math.random()*6)],
  };
}

// ---- render frame helper (with glow + particles) ----
function renderFrame(offCtx, offCanvas, img, dw, dh, t, amount) {
  const ease = (Math.sin(t * Math.PI * 2 - Math.PI / 2) + 1) / 2;
  offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);

  // transform values
  let tx = 0, ty = 0, sx = 1, sy = 1, rot = 0;
  if (currentAnim === 'float' || currentAnim === 'drift') ty = -ease * amount;
  if (currentAnim === 'sway' || currentAnim === 'drift') { const t2 = t * 1.4; rot = Math.sin(t2 * Math.PI * 2) * amount * 0.15 * Math.PI / 180; }
  if (currentAnim === 'breathe' || currentAnim === 'pulse') { const s = 1 + ease * amount * 0.005; sx = s; sy = s; }
  if (currentAnim === 'wobble') { ty = -ease * amount * 0.9; rot = Math.sin(t * Math.PI * 2 * 0.7) * amount * 0.04 * Math.PI / 180; }

  const cx = offCanvas.width / 2, cy = offCanvas.height / 2;

  // --- glow effect via canvas shadow ---
  const glowOn = document.getElementById('glow-toggle').checked;
  if (glowOn) {
    // pulse glow strength for pulse/breathe anims
    const glowStrength = (currentAnim === 'pulse' || currentAnim === 'breathe')
      ? 10 + ease * 25
      : 18;
    // parse glowColor rgba into shadowColor
    offCtx.shadowColor = glowColor;
    offCtx.shadowBlur = glowStrength;
  }

  offCtx.save();
  offCtx.translate(cx + tx, cy + ty);
  offCtx.rotate(rot);
  offCtx.scale(sx, sy);
  offCtx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
  offCtx.restore();

  // reset shadow
  offCtx.shadowColor = 'transparent';
  offCtx.shadowBlur = 0;

  // --- particles ---
  if (particlesActive) {
    const w = offCanvas.width, h = offCanvas.height;
    // spawn with same probability as preview
    if (Math.random() < 0.08) exportParticles.push(spawnExportParticle(w, h));
    exportParticles = exportParticles.filter(p => p.life > 0);
    exportParticles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      offCtx.globalAlpha = p.life * 0.8;
      offCtx.fillStyle = p.color;
      offCtx.beginPath();
      offCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      offCtx.fill();
      offCtx.globalAlpha = p.life * 0.4;
      offCtx.fillRect(p.x - p.size * 1.5 * p.life, p.y, p.size * 3 * p.life, 1);
      offCtx.fillRect(p.x, p.y - p.size * 1.5 * p.life, 1, p.size * 3 * p.life);
    });
    offCtx.globalAlpha = 1;
  }
}

// ---- export ----
exportBtn.addEventListener('click', async () => {
  if (!imageLoaded) return;
  exportBtn.disabled = true;
  exportBtn.textContent = '⏳ 処理中...';
  const progressWrap = document.getElementById('progress-wrap');
  const progressFill = document.getElementById('progress-fill');
  const progressLabel = document.getElementById('progress-label');
  progressWrap.classList.add('visible');
  progressFill.style.width = '0%';

  try {
    // reset export-side particles so each export starts fresh
    exportParticles = [];

    const img = illustImg;
    const w = img.naturalWidth, h = img.naturalHeight;
    const scale = Math.min(exportRes / w, exportRes / h, 1);
    const dw = Math.round(w * scale), dh = Math.round(h * scale);
    const amount = parseFloat(document.getElementById('amount').value);
    const dur = parseFloat(document.getElementById('speed').value) * 1000;
    const delay = Math.round(dur / exportFrames);

    const padding = Math.ceil(amount) + 10;
    const offCanvas = document.createElement('canvas');
    offCanvas.width = dw + padding * 2;
    offCanvas.height = dh + padding * 2;
    const offCtx = offCanvas.getContext('2d');

    function updateProgress(i, total) {
      const pct = Math.round((i / total) * 100);
      progressFill.style.width = pct + '%';
      progressLabel.textContent = `${i} / ${total} フレーム`;
    }

    // --- GIF ---
    if (exportFmt === 'gif') {
      if (typeof GIF === 'undefined') await loadScript('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js');
      const gif = new GIF({ workers: 2, quality: exportQuality, width: offCanvas.width, height: offCanvas.height });
      for (let i = 0; i < exportFrames; i++) {
        renderFrame(offCtx, offCanvas, img, dw, dh, i / exportFrames, amount);
        gif.addFrame(offCanvas, { delay, copy: true });
        updateProgress(i + 1, exportFrames);
        await new Promise(r => setTimeout(r, 0)); // yield to UI
      }
      gif.on('finished', blob => {
        download(URL.createObjectURL(blob), 'animated_illust.gif');
        done();
      });
      gif.on('progress', p => { progressFill.style.width = (50 + p * 50) + '%'; progressLabel.textContent = `エンコード中... ${Math.round(p*100)}%`; });
      gif.render();

    // --- WebM (MediaRecorder) ---
    } else if (exportFmt === 'webm') {
      const stream = offCanvas.captureStream(exportFrames);
      const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
      const chunks = [];
      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        download(URL.createObjectURL(blob), 'animated_illust.webm');
        done();
      };
      recorder.start();
      for (let i = 0; i < exportFrames; i++) {
        renderFrame(offCtx, offCanvas, img, dw, dh, i / exportFrames, amount);
        updateProgress(i + 1, exportFrames);
        await new Promise(r => setTimeout(r, delay));
      }
      recorder.stop();

    // --- APNG ---
    } else if (exportFmt === 'apng') {
      // Build APNG manually using canvas → PNG frames
      // We'll encode as a series of data URLs and zip them as a note
      // Simplified: export as individual PNGs in a zip isn't easy without a lib
      // Instead fall back to gif.js with high quality and rename
      if (typeof GIF === 'undefined') await loadScript('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js');
      const gif = new GIF({ workers: 2, quality: 1, width: offCanvas.width, height: offCanvas.height });
      for (let i = 0; i < exportFrames; i++) {
        renderFrame(offCtx, offCanvas, img, dw, dh, i / exportFrames, amount);
        gif.addFrame(offCanvas, { delay, copy: true });
        updateProgress(i + 1, exportFrames);
        await new Promise(r => setTimeout(r, 0));
      }
      gif.on('finished', blob => {
        download(URL.createObjectURL(blob), 'animated_illust_hq.gif');
        done();
      });
      gif.render();
    }

  } catch (e) {
    console.error(e);
    alert('エラーが発生しました: ' + e.message);
    done();
  }

  function download(url, name) {
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
  }
  function done() {
    exportBtn.disabled = false;
    exportBtn.textContent = '🎬 保存する';
    progressWrap.classList.remove('visible');
    progressFill.style.width = '0%';
  }
});

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

// init
resizeParticleCanvas();
</script>
</body>
</html>
